<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #faf8f5; --card-bg: #ffffff; --text: #2c2416;
  --text-secondary: #6b5e4a; --accent: #b8452a; --accent-light: #fdf3ee;
  --border: #e8e1d5; --tag-bg: #f5efe6;
  --shadow: 0 1px 3px rgba(44,36,22,.06);
  --font-cn: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --font-en: "Georgia", "Times New Roman", serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a1814; --card-bg: #25221c; --text: #e8e0d0;
    --text-secondary: #a09888; --accent: #d4735a; --accent-light: #2a1f1a;
    --border: #3a352a; --tag-bg: #2e2a22;
    --shadow: 0 1px 3px rgba(0,0,0,.2);
  }
}
body {
  font-family: var(--font-cn); background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  padding-bottom: 80px;
}
.app-header {
  position: sticky; top: 0; z-index: 10;
  background: var(--bg); padding: 16px 16px 0;
}
.app-header h1 { font-size: 22px; font-weight: 700; letter-spacing: .02em; }
.app-header .subtitle { font-size: 13px; color: var(--text-secondary); margin: 2px 0 12px; }
.tabs-wrap {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  margin: 0 -16px; padding: 0 16px; scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tabs { display: flex; gap: 8px; padding-bottom: 8px; }
.tab {
  flex-shrink: 0; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 500;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text-secondary);
  cursor: pointer; transition: all .2s; -webkit-tap-highlight-color: transparent; user-select: none;
}
.tab:active { opacity: .7; }
.tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.content { padding: 16px; }
.sentence-card {
  background: var(--card-bg); border-radius: 12px;
  box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden;
  border: 1px solid var(--border);
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; gap: 10px;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.card-number { font-size: 14px; font-weight: 700; color: var(--accent); white-space: nowrap; min-width: 40px; }
.card-preview {
  font-size: 13px; color: var(--text-secondary); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-arrow {
  font-size: 12px; color: var(--text-secondary); transition: transform .25s; flex-shrink: 0;
}
.sentence-card.open .card-arrow { transform: rotate(180deg); }
.card-body { display: none; padding: 0 16px 16px; }
.sentence-card.open .card-body { display: block; }
.level-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.level-tab {
  flex: 1; text-align: center; padding: 10px 0; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 2px solid var(--border); background: var(--tag-bg); color: var(--text-secondary);
  transition: all .2s; -webkit-tap-highlight-color: transparent;
}
.level-tab:active { opacity: .7; }
.level-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.level-content { animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.cn-block {
  margin-bottom: 12px; padding: 14px 15px; background: var(--tag-bg); border-radius: 10px;
  border-left: 3px solid var(--accent);
}
.cn-block .label { font-size: 11px; font-weight: 700; letter-spacing: .06em; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
.cn-block .text { font-size: 15px; line-height: 1.75; color: var(--text); }
.en-block {
  padding: 14px 15px; background: var(--tag-bg); border-radius: 10px;
}
.en-block .label { font-size: 11px; font-weight: 700; letter-spacing: .06em; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
.en-block .text {
  font-size: 14px; line-height: 1.7; color: var(--text-secondary);
  font-family: var(--font-en); font-style: italic;
}
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  background: var(--card-bg); border-top: 1px solid var(--border);
  display: flex; justify-content: center; gap: 8px; padding: 10px 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}
.bottom-btn {
  padding: 10px 20px; border-radius: 22px; border: 1px solid var(--border);
  background: var(--tag-bg); color: var(--text); font-size: 14px; font-weight: 500;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
  font-family: var(--font-cn);
}
.bottom-btn:active { opacity: .7; }
.bottom-btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 14px;
}
</style>

<script>
(function(){

var D = [{"number": 1, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "我想向所有的 留学生表示 我们衷心的欢迎。", "english": "I would like to extend our heartfelt welcome to all the overseas students."}, {"score": "8分句型", "chinese": "我想向将来我校学习的 所有留学生表示 我们衷心的欢迎。", "english": "I would like to extend our heartfelt welcome to all the overseas students who will study in our university."}, {"score": "10分句型", "chinese": "我谨代表北京外国语大学学生会，想向将来我们大学学习的 所有留学生表示我们衷心的欢迎。", "english": "On behalf of the Students’ Union of Beijing Foreign Studies University, I would like to extend our heartfelt welcome to all the overseas students who will study in our university."}]}, {"number": 2, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "各种各样的课外活动仍会提供大量结交朋友的机会。", "english": "Various after-class activities will still provide ample opportunities to make friends."}, {"score": "8分句型", "chinese": "运动会、演讲比赛以及联谊会等 各种各样的课外活动仍会提供大量结交朋友的机会。", "english": "Various after-class activities such as sports meets, speech contests and social gatherings will still provide ample opportunities to make friends."}, {"score": "10分句型", "chinese": "尽管有以上负担，运动会、演讲比赛以及联谊会等各种各样的课外活动仍会提供大量结交朋友的机会。", "english": "In spite of all those burdens, various extracurricular activities such as sports meets, speech contests and social gatherings will still provide ample opportunities to make friends."}]}, {"number": 3, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "时光将意义非凡，并为你的整个人生增添光彩。", "english": "The time will be worthwhile and enhance your whole life."}, {"score": "8分句型", "chinese": "你在这所校园里度过的 时光将意义非凡，并为你的整个人生增添光彩。", "english": "The time you spend on our campus will be worthwhile and enhance your whole life."}, {"score": "10分句型", "chinese": "总之，尽管有很多压力，但你在这所校园里度过的时光将意义非凡，并为你的整个人生增添光彩。", "english": "All in all, although there is a lot of pressure, the time you spend on our campus will be worthwhile and enhance your whole life."}]}, {"number": 4, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "事实表明一种文化可以被接受、尊重、欣赏和分享。", "english": "The fact indicates that a culture can be accepted, respected, appreciated and shared."}, {"score": "8分句型", "chinese": "事实表明， 在某种程度上 一种文化可以 在国际范围内 被接受、尊重、欣赏和分享。", "english": "The fact indicates that to some extent a culture can be accepted, respected, appreciated and shared internationally."}, {"score": "10分句型", "chinese": "神秘的中国文化吸引了各国人民这一 事实表明，在某种程度上一种文化可以在国际范围内被接受、尊重、欣赏和分享。", "english": "The fact that people from different countries are attracted to mysterious Chinese culture indicates that to some extent a culture can be accepted, respected, appreciated and shared internationally."}]}, {"number": 5, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "一个民族 的文化可以走向世界。", "english": "A nation’s culture can become international."}, {"score": "8分句型", "chinese": "换言之， 一个民族 独特的 文化可以走向世界。", "english": "In other words, a nation’s unique culture can become international."}, {"score": "10分句型", "chinese": "换言之，一个民族独特的文化可以 通过全球性的经济和文化交流 走向世界。", "english": "In other words, a nation’s unique culture can become international through worldwide economic and cultural exchange."}]}, {"number": 6, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "文化交流可以增进相互间的理解和友谊。", "english": "Cultural exchange can improve mutual understanding and friendship."}, {"score": "8分句型", "chinese": "国家间 日益频繁的 文化交流可以 有效增进相互间的理解和友谊。", "english": "Increasing cultural exchange can effectively improve mutual understanding and friendship between countries."}, {"score": "10分句型", "chinese": "由于全球化潮流不可阻挡，所以 国家间 日益频繁的文化交流可以有效增进相互间的理解和友谊。", "english": "Since the trend of globalization has become irresistible, increasing cultural exchange can effectively improve mutual understanding and friendship between countries."}]}, {"number": 7, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "我们应该保存和珍惜民族文化。", "english": "National culture should be preserved and cherished."}, {"score": "8分句型", "chinese": "在我看来， 我们应该保存和珍惜民族文化。", "english": "It is my view that national culture should be preserved and cherished."}, {"score": "10分句型", "chinese": "在我看来，我们应该保存和珍惜 作为无价精神财富的 民族文化。", "english": "It is my view that national culture should be preserved and cherished as a priceless spiritual treasure."}]}, {"number": 8, "section": "第一节  小作文：建议信  |  大作文：传统文化", "levels": [{"score": "6分句型", "chinese": "我们应该充满理智地取其精华。", "english": "We should be sensible enough to absorb its virtues."}, {"score": "8分句型", "chinese": "然而， 我们面临不同文化应该充满理智地取其精华、 去其糟粕。", "english": "Nevertheless, we should be sensible enough to absorb its virtues and to resist its dark side."}, {"score": "10分句型", "chinese": "然而， 在我们面临不同文化时， 应该充满理智地取其精华、去其糟粕。", "english": "Nevertheless, when we are confronted with a different culture, we should be sensible enough to absorb its virtues and to resist its dark side."}]}, {"number": 9, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "我写这封信是为了向你推荐我最喜欢的一部电影。", "english": "I'm writing the letter in order to recommend one of my favorite movies to you."}, {"score": "8分句型", "chinese": "我写这封信是为了向你推荐我最喜欢的一部电影： 《八十天环游地球 》。", "english": "I'm writing the letter in order to recommend one of my favorite movies to you—— Around the World in Eighty Days."}, {"score": "10分句型", "chinese": "作为你最好的一位朋友，我写这封信是为了向你推荐我最喜欢的一部电影： 《八十天环游地球 》。", "english": "As one of your closest friends, I'm writing the letter in order to recommend one of my favorite movies to you—— Around the World in Eighty Days."}]}, {"number": 10, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "故宫博物院曾经是皇家宫殿。", "english": "The Palace Museum was the imperial palace."}, {"score": "8分句型", "chinese": "首先，故宫博物院曾经是 明代和清代的 皇家宫殿。", "english": "To begin with, the Palace Museum was the imperial palace of the Ming and Qing Dynasty."}, {"score": "10分句型", "chinese": "首先，故宫博物院 也被称为紫禁城， 曾经是明代和清代的皇家宫殿。", "english": "To begin with, the Palace Museum, also known as the Forbidden City, was the imperial palace of the Ming and Qing Dynasty."}]}, {"number": 11, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "长城被列为世界遗产之一。", "english": "The Great Wall was listed as one of the world heritage sites."}, {"score": "8分句型", "chinese": "1987年，长城被联合国教科文组织 (UNESCO) 列为世界遗产之一。", "english": "The Great Wall was listed as one of the world heritage sites by the UNESCO in 1987."}, {"score": "10分句型", "chinese": "长城是中国古代人民的伟大创造， 1987年被联合国教科文组织列为世界遗产之一。", "english": "As the great creation of ancient Chinese people, the Great Wall was listed as one of the world heritage sites by the UNESCO in 1987."}]}, {"number": 12, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "我每天上网与他人在 微博上讨论新闻。", "english": "I get online every day to discuss news with other people on Microblog."}, {"score": "8分句型", "chinese": "作为一名大学生， 我每天上网与他人在 微博上讨论新闻。", "english": "As a college student, I get online every day to discuss news with other people on Microblog."}, {"score": "10分句型", "chinese": "作为一名大学生，我每天上网与他人在 微博上讨论新闻， 借助微信和我的朋友们免费聊天。", "english": "As a college student, I get online every day to discuss news with other people on Microblog and to chat freely through WeChat."}]}, {"number": 13, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "很多人承认他们沉迷于网络。", "english": "A good many people admit that they are addicted to the Internet."}, {"score": "8分句型", "chinese": "很多人承认他们 太沉迷于网络 而不愿保持面对面接触。", "english": "A good many people admit that they are too addicted to the Internet to maintain face-to-face contact."}, {"score": "10分句型", "chinese": "但另一方面，很多人承认他们太沉迷于网络而不愿 与朋友和同事 保持面对面接触。", "english": "But on the other hand, a good many people admit that they are too addicted to the Internet to maintain face-to-face contact with their friends and colleagues."}]}, {"number": 14, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "人们不愿接近他人。", "english": "People feel reluctant to approach others."}, {"score": "8分句型", "chinese": "人们不愿接近他人，也不愿专注于现实生活。", "english": "People feel reluctant to approach others and to concentrate on real life."}, {"score": "10分句型", "chinese": "一旦沉迷于这种虚幻世界， 人们不愿接近他人，也不愿专注于现实生活。", "english": "Once having indulged in the fictitious world, people feel reluctant to approach others and to concentrate on real life."}]}, {"number": 15, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "我们很有必要使用互联网。", "english": "It is necessary for us to use the Internet."}, {"score": "8分句型", "chinese": "因此，我们很有必要 以一种合理的方式 使用互联网。", "english": "Hence, it is necessary for us to use the Internet in a reasonable way."}, {"score": "10分句型", "chinese": "因此，我们很有必要以一种合理的方式使用互联网，避免过度沉迷。", "english": "Hence, it is necessary for us to use the Internet in a reasonable way and restrain from overindulgence."}]}, {"number": 16, "section": "第二节  小作文：推荐信  |  大作文：流行文化", "levels": [{"score": "6分句型", "chinese": "人们发明互联网是为了连接你和我。", "english": "The Internet was invented to connect you and me."}, {"score": "8分句型", "chinese": "人们发明互联网是为了连接你和我， 为我们的生活带来便捷。", "english": "The Internet was invented to connect you and me and to bring conveniences to our life."}, {"score": "10分句型", "chinese": "毕竟，人们发明互联网是为了连接你和我，为我们的生活带来便捷， 而非设置障碍使人彼此疏远。", "english": "After all, the Internet was invented to connect you and me, and to bring conveniences to our life rather than setting barriers to keep people beyond reach."}]}, {"number": 17, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "我写这封邮件是为了邀请您担任我们的新评委。", "english": "I’m writing to invite you to be our new judge."}, {"score": "8分句型", "chinese": "谨代表比赛委员会， 我写这封邮件是为了邀请您担任我们的新评委。", "english": "On behalf of the Contest committee, I’m writing to invite you to be our new judge."}, {"score": "10分句型", "chinese": "谨代表 “天才”英语演讲 比赛委员会，我写这封邮件是为了邀请您担任我们的新评委。", "english": "On behalf of the “Talents” English Speech Contest committee, I’m writing to invite you to be our new judge."}]}, {"number": 18, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "这场比赛将在 5月12日于学生大礼堂举行。", "english": "This contest is to be held in the Students’ Auditorium on May 12."}, {"score": "8分句型", "chinese": "这场全校性的 比赛将在 5月12日（下周日） 于学生大礼堂举行。", "english": "This school-wide contest is to be held in the Students’ Auditorium on May 12 (next Sunday ）."}, {"score": "10分句型", "chinese": "作为我们“外国文化节”的核心部分， 这场全校性的比赛将在 5月12日（下周日）于学生大礼堂举行。", "english": "As the core part of our “Foreign Culture Festival”, this school-wide contest is to be held in the Students’ Auditorium on May 12 (next Sunday ）."}]}, {"number": 19, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "您能给参赛选手一些启发性的评论。", "english": "You can give our competitors some enlightening comments."}, {"score": "8分句型", "chinese": "我们相信 您能给参赛选手一些启发性的评论。", "english": "We believe that you can give our competitors some enlightening comments."}, {"score": "10分句型", "chinese": "我们相信您 作为一位英语为母语人士和知识渊博的教授， 能给参赛选手一些启发性的评论。", "english": "We believe that you can give our competitors some enlightening comments as both a native-English speaker and a knowledgeable professor."}]}, {"number": 20, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "中国在 经济方面变得异常活跃。", "english": "China has become particularly active in economy."}, {"score": "8分句型", "chinese": "中国在 经济方面变得异常活跃， 这使得对 人才的需求 增长。", "english": "China has become particularly active in economy, which has led to an increased demand of talents."}, {"score": "10分句型", "chinese": "首先， 中国在 经济方面变得异常活跃，这使得对 高素质 人才的需求增长。", "english": "First and foremost, China has become particularly active in economy, which has led to an increased demand of qualified talents."}]}, {"number": 21, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "就业市场的总体发展无法跟上大学毕业生人数的增加。", "english": "The development of the job market on the whole cannot keep pace with the expansion of college graduates."}, {"score": "8分句型", "chinese": "就业市场的总体发展无法跟上大学毕业生人数的增加， 这促使学生在校园里再呆三年时间。", "english": "The development of the job market on the whole cannot keep pace with the expansion of college graduates, which has obliged students to stay on campus for another three years."}, {"score": "10分句型", "chinese": "此外， 就业市场的总体发展无法跟上大学毕业生人数的增加，这促使 很多学生在校园里再呆三年时间， 为就业做更好的准备。", "english": "In addition, the development of the job market on the whole cannot keep pace with the expansion of college graduates, which has obliged a large number of students to stay on campus for another three years to get better prepared for their careers."}]}, {"number": 22, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "选择升学的毕业生 人数在未来十年将会继续增加。", "english": "The graduates choosing further education will keep growing in the forthcoming decade."}, {"score": "8分句型", "chinese": "随着社会的迅速发展， 选择升学的毕业生 人数在未来十年将会继续增加。", "english": "With the speedy development of our society, the graduates choosing further education will keep growing in the forthcoming decade."}, {"score": "10分句型", "chinese": "考虑到所有这些因素，我们可以预计： 随着社会的迅速发展， 选择升学的毕业生 人数在未来十年将会继续增加。", "english": "Taking all these factors into account, we may predict that with the speedy development of our society, the graduates choosing further education will keep growing in the forthcoming decade."}]}, {"number": 23, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "这种趋势可能带来很多问题。", "english": "This tendency may bring about a good many problems."}, {"score": "8分句型", "chinese": "这种趋势可能带来很多问题， 例如人才的浪费。", "english": "This tendency may bring about a good many problems, such as the waste of talent."}, {"score": "10分句型", "chinese": "然而，问题的另一方面， 这种趋势可能带来很多问题，例如人才的浪费。", "english": "On the other side of the coin, however, this tendency may bring about a good many problems, such as the waste of talent."}]}, {"number": 24, "section": "第三节  小作文：邀请信  |  大作文：教育", "levels": [{"score": "6分句型", "chinese": "我们必须采取有效的措施确保这一状况不会失控。", "english": "It is necessary for us to take effective measures to ensure this situation doesn’t get out of hand."}, {"score": "8分句型", "chinese": "我们必须采取有效的措施确保这一状况不会失控， 同时鼓励学生选择那些专业。", "english": "It is necessary for us to take effective measures to ensure this situation doesn’t get out of hand, and encourage students to choose majors."}, {"score": "10分句型", "chinese": "我们必须采取有效的措施确保这一状况不会失控，同时鼓励学生选择那些 在就业市场上需要的既有理论知识又有实践技能的 专业。", "english": "It is necessary for us to take effective measures to ensure this situation doesn’t get out of hand, and encourage students to choose majors for which both theoretical knowledge and practical skills will be demanded in the job market."}]}, {"number": 25, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "我想为 这个工程贡献我的微薄之力。", "english": "I would like to contribute my bit to the project."}, {"score": "8分句型", "chinese": "我想通过给一个孩子提供经济帮助，来为这个工程贡献我的微薄之力。", "english": "I would like to contribute my bit to the project by offering financial aid to a child."}, {"score": "10分句型", "chinese": "我想通过给 贵省偏远地区的 一个孩子提供经济帮助，来为希望工程贡献我的微薄之力。", "english": "I would like to contribute my bit to the project by offering financial aid to a child in a remote area of your province."}]}, {"number": 26, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "如果您能帮助我找到一个小女孩，我将不胜感激。", "english": "I would be very grateful if you could help me seek out a girl."}, {"score": "8分句型", "chinese": "如果您能帮助我找到一个 刚开始上学的 小女孩，我将不胜感激。", "english": "I would be very grateful ifyou could help me seek out a girl who has just started schooling."}, {"score": "10分句型", "chinese": "如果您能帮助我找到一个刚开始上学 但家庭无法为其负担学费 的小女孩，我将不胜感激。", "english": "I would be very grateful if you could help me seek out a girl who has just started schooling but whose family cannot afford her education."}]}, {"number": 27, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "本人计划支付她的学费。", "english": "My plan is to pay for her tuition."}, {"score": "8分句型", "chinese": "本人计划 按年度 支付她的学费。", "english": "My plan is to pay for her tuition on an annual basis."}, {"score": "10分句型", "chinese": "本人计划按年度支付她的学费 直至她中学毕业。", "english": "My plan is to pay for her tuition on an annual basis until she finishes her secondary education."}]}, {"number": 28, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "最重要的是拥有自信。", "english": "Possessing self-confidence is of the utmost significance."}, {"score": "8分句型", "chinese": "这幅漫画的目的是告诉我们 最重要的是拥有自信。", "english": "The purpose of the drawing is to show us that possessing self-confidence is of the utmost significance."}, {"score": "10分句型", "chinese": "这幅漫画的目的是告诉我们 在看似不可克服的挑战与困境面前，最重要的是拥有自信。", "english": "The purpose of the drawing is to show us that in the face of seemingly insurmountable challenges or predicaments, possessing self-confidence is of the utmost significance."}]}, {"number": 29, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "他或她会遭遇难题。", "english": "He or she will encounter problems."}, {"score": "8分句型", "chinese": "总有一天 他或她会遭遇难题。", "english": "There are bound to be times when he or she will encounter problems."}, {"score": "10分句型", "chinese": "无论一个人在学校或工作中曾经如何成功， 总有一天他或她会遭遇难题。", "english": "Regardless of how much success one has had in school or at work, there are bound to be times when he or she will encounter problems."}]}, {"number": 30, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "一个人的自信发挥重要的作用。", "english": "One’s self-confidence plays a crucial role."}, {"score": "8分句型", "chinese": "一个人的自信发挥重要的作用， 决定他是否能够反败为胜。", "english": "One’s self-confidence plays a crucial role in determining whether he or she can turn failure into victory."}, {"score": "10分句型", "chinese": "一个人 总体上对困难和人生的 自信发挥重要的作用， 决定他是否能够反败为胜。", "english": "One’s self-confidence, toward difficulty and toward life in general, plays a crucial role in determining whether he or she can turn failure into victory."}]}, {"number": 31, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "我们决不能高估困难或低估自己的能力。", "english": "We should never overestimate the difficulties or underestimate our abilities."}, {"score": "8分句型", "chinese": "无论面临何种任务， 我们决不能高估困难或低估自己的能力。", "english": "No matter what tasks we are confronted with, we should never overestimate the difficulties or underestimate our abilities."}, {"score": "10分句型", "chinese": "这个例子清楚证明了 无论面临何种任务，我们决不能高估困难或低估自己的能力。", "english": "This case effectively illustrates that no matter what tasks we are confronted with, we should never overestimate the difficulties or underestimate our abilities."}]}, {"number": 32, "section": "第四节  小作文：爱心信  |  大作文：人生哲理", "levels": [{"score": "6分句型", "chinese": "只有这样在竞争激烈的社会中他们才能成为赢家。", "english": "Only in this way can they become winners in this competitive world."}, {"score": "8分句型", "chinese": "只有经历更多的挑战，年轻人才能培养强大的个性， 而且只有这样在竞争激烈的社会中他们才能成为赢家。", "english": "Only by undergoing more challenges can young people cultivate strong personalities, and only in this way can they become winners in this competitive world."}, {"score": "10分句型", "chinese": "只有在逆境中 经历更多的挑战 和磨练，年轻人才能培养强大的个性 和能力，而且只有这样在竞争激烈的社会中他们才能成为赢家。", "english": "Only by undergoing more challenges and toils in adversity can young people cultivate strong personalities and abilities, and only in this way can they become winners in this competitive world."}]}, {"number": 33, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "6分句型", "chinese": "我被诊断出患上了一种耳部感染疾病。", "english": "I have been diagnosed with aear infection."}, {"score": "8分句型", "chinese": "不幸的是， 我被诊断出患上了一种耳部感染疾病， 需要进行手术。", "english": "Unfortunately, I have been diagnosed with an ear infection which will require surgery."}, {"score": "10分句型", "chinese": "不幸的是， 最近我被诊断出患上了一种 严重的耳部感染疾病，需要 在出发当天进行手术。", "english": "Unfortunately, I have recently been diagnosed with a serious ear infection which will require surgery on the same day as my departure."}]}, {"number": 34, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "8分句型", "chinese": "请原谅我没能告诉您。", "english": "Please excuse me for not being able to inform you."}, {"score": "10分句型", "chinese": "请原谅我没能 提早告诉您我的情形。", "english": "Please excuse me for not being able to inform you of my situation sooner."}]}, {"number": 35, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "6分句型", "chinese": "类似情况绝非经常发生。", "english": "Such a situation does not usually happen."}, {"score": "8分句型", "chinese": "我保证类似情况绝非经常发生， 对于任何不便，我深表歉意。", "english": "I promise that such a situation does not usually happen, and apologize for any inconvenience."}, {"score": "10分句型", "chinese": "我保证类似情况绝非经常发生， 由此可能给您造成的 任何不便，我深表歉意。", "english": "I promise that such a situation does not usually happen, and apologize for any inconvenience this may cause you."}]}, {"number": 36, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "8分句型", "chinese": "有些人似乎忽视了其对环境的负面影响。", "english": "Some people seem to ignore its negative effects on the environment."}, {"score": "10分句型", "chinese": "有些人认为旅游业是经济发展的引擎， 似乎忽视了其对环境的负面影响。", "english": "Some people, under the belief that tourism serves as an engine of economic growth, seem to ignore its negative effects on the environment."}]}, {"number": 37, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "6分句型", "chinese": "旅游业已经给我们生存的环境带来了巨大的压力。", "english": "Tourism has exerted great pressure on the environment we are living in."}, {"score": "8分句型", "chinese": "另一方面， 旅游业已经给我们生存的环境带来了巨大的压力： 水受到污染。", "english": "On the other hand, tourism has exerted great pressure on the environment we are living in: our water is polluted."}, {"score": "10分句型", "chinese": "另一方面，旅游业已经给我们生存的环境带来了巨大的压力：水受到污染， 生态平衡遭到破坏，自然资源被过度开发。", "english": "On the other hand, tourism has exerted great pressure on the environment we are living in: our water is polluted, our ecological system is disturbed, and our natural resources have been excessively used."}]}, {"number": 38, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "6分句型", "chinese": "任何国家都无法禁止旅游业。", "english": "Tourism could not be banned in any country."}, {"score": "8分句型", "chinese": "毫无疑问，由于 旅游业确实有助于发展经济， 因此任何国家都无法禁止旅游业。", "english": "Undoubtedly, tourism could not be banned in any country, as it does help to shore up the economy."}, {"score": "10分句型", "chinese": "毫无疑问，由于 对那些几乎没有其他收入来源的地区而言，旅游业确实有助于发展经济，因此任何国家都无法禁止旅游业。", "english": "Undoubtedly, tourism could not be banned in any country, as it does help to shore up the economy in places which have few sources of income."}]}, {"number": 39, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "6分句型", "chinese": "毫无节制的发展可能使得发展不可持续。", "english": "The unchecked growth may render the development unsustainable."}, {"score": "8分句型", "chinese": "旅游业毫无节制的发展可能使得 经济发展不可持续。", "english": "The unchecked growth of the travel business may render the development of an economy unsustainable."}, {"score": "10分句型", "chinese": "但重要的是， 旅游业毫无节制的发展可能使得经济发展不可持续。", "english": "However, the main point is that the unchecked growth of the travel business may render the development of an economy unsustainable."}]}, {"number": 40, "section": "第五节  小作文：道歉信  |  大作文：环境保护", "levels": [{"score": "6分句型", "chinese": "是时候加强人们的意识了。", "english": "It is high time that we enhanced people‘s awareness."}, {"score": "8分句型", "chinese": "是时候加强人们的意识， 来改变这一现状了。", "english": "It is high time that we enhanced people's awareness to rectify this."}, {"score": "10分句型", "chinese": "是时候加强人们的意识， 通过多加考虑环境保护 因素来改变这一现状了。", "english": "It is high time that we enhanced people's awareness to rectify this by taking the environmental protection into consideration."}]}, {"number": 41, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "后果会很严重。", "english": "The consequences might have been very serious."}, {"score": "8分句型", "chinese": "如果不是您及时帮我的话， 恐怕后果会很严重。", "english": "If it had not been for your timely assistance, the consequences might have been very serious."}, {"score": "10分句型", "chinese": "如果不是您及时帮我 进行急救处理 的话， 恐怕后果会很严重。", "english": "If it had not been for your timely assistance in giving me first aid, I fear that the consequences might have been very serious."}]}, {"number": 42, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "正是您的反应才促成了这样令人满意的结果。", "english": "It is your response that has led to this satisfactory outcome."}, {"score": "8分句型", "chinese": "大家都认为， 正是您的反应才促成了这样令人满意的结果。", "english": "Everyone agrees that it is your response that has led to this satisfactory outcome."}, {"score": "10分句型", "chinese": "大家都认为，正是您 在那个紧急事件中 的机智反应才促成了这样令人满意的结果。", "english": "Everyone agrees that it is your quick-witted response in that emergency that has led to this satisfactory outcome."}]}, {"number": 43, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "很少有人言行一致。", "english": "Very few people practice what they preach."}, {"score": "8分句型", "chinese": "尽管现在人们谈论大公无私的必要性，但是 很少有人言行一致。", "english": "Although people talk about the need to be un selfish, very few people practice what they preach."}, {"score": "10分句型", "chinese": "尽管现在 越来越多的 人谈论大公无私的必要性，但是 我们看到 很少有人言行一致。", "english": "Although nowadays people in mounting numbers talk about the need to be un selfish, we see very few people practice what they preach."}]}, {"number": 44, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "人们正在面临生理或心理问题。", "english": "People are suffering either physical ormental problems."}, {"score": "8分句型", "chinese": "随着都市生活节奏的加快， 人们正在面临 生理或心理问题。", "english": "With the quickening pace of urban life, people are suffering either physical ormental problems."}, {"score": "10分句型", "chinese": "随着都市生活节奏的加快 和压力的不断增加，越来越多的 人正在面临生理或心理问题。", "english": "With the quickening pace and ever-increasing pressure of urban life, people in growing numbers are suffering either physical ormental problems."}]}, {"number": 45, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "人们各自选择慢跑 或骑车作为日常锻炼 方式。", "english": "People respectively choose jogging or riding as their regular exercises."}, {"score": "8分句型", "chinese": "人们各自选择慢跑、 爬山或骑车作为日常锻炼 方式，这是因为这些运动总是使他们更强壮。", "english": "People respectively choose jogging, climbing or riding as their regular exercises because exercises never fail to make them stronger."}, {"score": "10分句型", "chinese": "人们各自选择慢跑、 打篮球、游泳、滑冰、 爬山或骑车作为日常锻炼 方式，这是因为这些运动总是使他们更强壮、更精力充沛。", "english": "People respectively choose jogging, playing basketball, swimming, skating, climbing or riding as their regular exercises because exercises never fail to make them stronger and more energetic."}]}, {"number": 46, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "相反，我晚上 11点之前上床睡觉。", "english": "Instead, I go to bed before 11 o’clock at night."}, {"score": "8分句型", "chinese": "相反，我晚上 11点之前上床睡觉， 因为熬夜对健康有害。", "english": "Instead, I go to bed before 11 o’clock at night, because burning the midnight oil is harmful to health."}, {"score": "10分句型", "chinese": "相反，我 保持均衡饮食，而且 晚上11点之前上床睡觉，因为 我相信 熬夜对健康有害。", "english": "Instead, I keep a balanced diet and go to bed before 11 o’clock at night, because I believe burning the midnight oil is harmful to health."}]}, {"number": 47, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "我们需要保持一种乐观的心态。", "english": "We need to maintain an optimistic mentality."}, {"score": "8分句型", "chinese": "尤其在逆境中， 我们需要保持一种乐观的心态。", "english": "Especially in adversity, we need to maintain an optimistic mentality."}, {"score": "10分句型", "chinese": "尤其在逆境中，我们需要保持一种乐观的心态 来经历人生的痛苦悲伤、迂回曲折。", "english": "Especially in adversity, we need to maintain an optimistic mentality to pull through life’s pains and sorrows, twists and turns."}]}, {"number": 48, "section": "第六节  小作文：感谢信  |  大作文：健康", "levels": [{"score": "6分句型", "chinese": "乐观态度使我充满自信。", "english": "An optimistic attitude makes me confident."}, {"score": "8分句型", "chinese": "更为重要的是， 乐观态度使我充满自信。", "english": "More importantly, an optimistic attitude makes me confident."}, {"score": "10分句型", "chinese": "更为重要的是， 对生活的 乐观态度使我充满自信 而且坚持不懈。", "english": "More importantly, an optimistic attitude towards life makes me confident and persistent."}]}, {"number": 49, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "贵方提供的服务远远不能令人满意。", "english": "The service you have recently provided is far from satisfactory."}, {"score": "8分句型", "chinese": "我完全失望地发现 贵方提供的服务远远不能令人满意。", "english": "I am severely disappointed to find that the service you have recently provided is far from satisfactory."}, {"score": "10分句型", "chinese": "作为贵列车的一位常客， 我完全失望地发现 贵方提供的服务远远不能令人满意。", "english": "As a regular passenger of your train, I am severely disappointed to find that the service you have recently provided is far from satisfactory."}]}, {"number": 50, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "我写这封信希望引起您的关注。", "english": "I am writing this letter to draw your attention."}, {"score": "8分句型", "chinese": "因此，我写这封信希望引起您 对这一问题 的关注。", "english": "Therefore, I am writing this letter to draw your attention to the matter."}, {"score": "10分句型", "chinese": "因此，我写这封信希望引起您对这一问题的关注， 能够很大程度地 改进现状。", "english": "Therefore, I am writing this letter to draw your attention to the matter in the hope that the present situation can be improved."}]}, {"number": 51, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "您会认真考虑这个问题。", "english": "You will take this matter into serious consideration."}, {"score": "8分句型", "chinese": "您会认真考虑这个问题， 并给出满意的答复。", "english": "You will take this matter into serious consideration and give a satisfactory reply."}, {"score": "10分句型", "chinese": "我相信您会认真考虑这个问题，并 尽快给出满意的答复。", "english": "I believe you will take this matter into serious consideration and give a satisfactory reply as soon as possible."}]}, {"number": 52, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "这幅图反映了普遍存在的现象。", "english": "This picture reveals a not-uncommon phenomenon."}, {"score": "8分句型", "chinese": "这幅图反映了 一些中国家庭中 普遍存在的现象。", "english": "This picture reveals a not-uncommon phenomenon in some families in China."}, {"score": "10分句型", "chinese": "这幅图反映了一些中国家庭中普遍存在的现象 ——子女成年后如何对待他们的父母。", "english": "This picture reveals a not-uncommon phenomenon of how elders are treated by their grown-up children in some families in China."}]}, {"number": 53, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "老年人成了负担，被踢来踢去。", "english": "The elders become burdens to be kicked around."}, {"score": "8分句型", "chinese": "他们就成了负担，被 自己的子女们像足球一样 踢来踢去。", "english": "The elders become burdens to be kicked around by their sons and daughters like a football."}, {"score": "10分句型", "chinese": "当父母年龄太大不能照顾自己的时候， 他们就成了负担，被自己的子女们像足球一样踢来踢去。", "english": "When they are too old to take care of themselves, the elders become burdens to be kicked around by their sons and daughters like a football."}]}, {"number": 54, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "中国及中国人民一直奉行孝道。", "english": "China and the Chinese people have been practicing filial piety."}, {"score": "8分句型", "chinese": "作为一个国家， 中国及中国人民 自古以来 一直奉行孝道。", "english": "As a nation, China and the Chinese people have been practicing filial piety throughout history."}, {"score": "10分句型", "chinese": "作为一个 以很多美德闻名于世的 国家，中国及中国人民自古以来一直奉行孝道。", "english": "As a nation renowned worldwide for its many virtues, China and the Chinese people have been practicing filial piety throughout history."}]}, {"number": 55, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "许多故事反复强调了这种爱老敬老的美德。", "english": "Many stories reiterate this virtue of loving and respecting the elders."}, {"score": "8分句型", "chinese": "许多广为传颂的 故事反复强调了这种 历史悠久的 爱老敬老的美德，如西汉的缇萦的故事。", "english": "Many often-told stories reiterate this time-honored virtue of loving and respecting the elders, such as the story of Tiying in the Western Han Dynasty."}, {"score": "10分句型", "chinese": "许多广为传颂的故事反复强调了这种历史悠久的爱老敬老的美德，如西汉的缇萦 舍身营救蒙冤的父亲免于极刑 的故事。", "english": "Many often-told stories reiterate this time-honored virtue of loving and respecting the elders, such as the story of Tiying in the Western Han Dynasty who risked her life in order to save her wronged father from corporal punishment."}]}, {"number": 56, "section": "第七节  小作文：投诉信  |  大作文：两代关系", "levels": [{"score": "6分句型", "chinese": "他们应该感激父母的养育之恩。", "english": "They are much indebted to their parents for their rearing."}, {"score": "8分句型", "chinese": "那些人应该牢记， 他们应该感激父母的养育之恩。", "english": "Those should bear in mind that they are much indebted to their parents for their rearing."}, {"score": "10分句型", "chinese": "那些千方百计逃避照顾双亲的责任的 人应该牢记，他们应该感激父母的养育之恩。", "english": "Those who try every means to avoid their duties of looking after their elders should bear in mind that they are much indebted to their parents for their rearing."}]}, {"number": 57, "section": "第八节  小作文：告示  |  大作文：爱心", "levels": [{"score": "6分句型", "chinese": "本校将举行研讨会，现招募志愿者。", "english": "Volunteers are needed for the conference to be held on this campus."}, {"score": "8分句型", "chinese": "本校将 于七月初 举行国际研讨会，现招募志愿者。", "english": "Volunteers are needed for the conference to be held on this campus in early July."}, {"score": "10分句型", "chinese": "本校将 于七月初 举行关于全球化的国际 研讨会，现招募志愿者。", "english": "Volunteers are needed for the International Conference on Globalization to be held on this campus in early July."}]}, {"number": 58, "section": "第八节  小作文：告示  |  大作文：爱心", "levels": [{"score": "8分句型", "chinese": "基本要求是熟悉本次会议的主题。", "english": "Basic requirements are familiarity with the theme of the conference."}, {"score": "10分句型", "chinese": "基本要求是熟悉本次会议的主题 以及精通英语。", "english": "Basic requirements are familiarity with the theme of the conference and proficiency of English."}]}, {"number": 59, "section": "第八节  can we help to make the world a better place, for, as the picture shows, the darker the shadows of sorrow become, the more brightly the lamp of love shines."}]}];

var SEC = (function(){
  var m={}, a=[];
  D.forEach(function(s){
    if(!m[s.section]){ m[s.section]={t:s.section,ss:[]}; a.push(m[s.section]); }
    m[s.section].ss.push(s);
  });
  return a;
})();

var curSec=0, exp={}, lvl={};

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTabs(){
  var h='';
  SEC.forEach(function(sec,i){
    var label=sec.t.replace(/^第.节\s*/,'').replace(/\s*\|\s*/g,' · ');
    h+='<div class="tab'+(i===0?' active':'')+'" onclick="App.selSec('+i+')">'+esc(label)+'</div>';
  });
  document.getElementById('sectionTabs').innerHTML=h;
}

function selSec(i){
  curSec=i;
  var ts=document.querySelectorAll('.tab');
  ts.forEach(function(t,j){ t.classList.toggle('active',j===i); });
  if(ts[i]) ts[i].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  renderCards();
}

function renderCards(){
  var sec=SEC[curSec];
  if(!sec) return;
  var h='';
  sec.ss.forEach(function(s){
    var open=!!exp[s.number];
    var preview=s.levels.length?s.levels[0].chinese.slice(0,35):'';
    h+='<div class="sentence-card'+(open?' open':'')+'" id="c'+s.number+'">';
    h+='<div class="card-header" onclick="App.toggle('+s.number+')">';
    h+='<span class="card-number">No.'+s.number+'</span>';
    h+='<span class="card-preview">'+esc(preview)+'</span>';
    h+='<span class="card-arrow">&#9660;</span>';
    h+='</div><div class="card-body">';
    h+='<div class="level-tabs">';
    s.levels.forEach(function(l,li){
      var act=(lvl[s.number]||0)===li;
      h+='<div class="level-tab'+(act?' active':'')+'" onclick="event.stopPropagation();App.selLvl('+s.number+','+li+')">'+l.score+'</div>';
    });
    h+='</div>';
    var al=s.levels[lvl[s.number]||0];
    if(al){
      h+='<div class="level-content">';
      h+='<div class="cn-block"><div class="label">Chinese</div><div class="text">'+esc(al.chinese)+'</div></div>';
      h+='<div class="en-block"><div class="label">English</div><div class="text">'+esc(al.english)+'</div></div>';
      h+='</div>';
    }
    h+='</div></div>';
  });
  document.getElementById('content').innerHTML=h||'<div class="empty-state">No content</div>';
}

window.App={
  selSec:selSec,
  toggle:function(n){ exp[n]=!exp[n]; var c=document.getElementById('c'+n); if(c)c.classList.toggle('open',exp[n]); },
  selLvl:function(n,li){ lvl[n]=li; renderCards(); },
  expandAll:function(){ SEC[curSec].ss.forEach(function(s){ exp[s.number]=true; }); renderCards(); },
  collapseAll:function(){ SEC[curSec].ss.forEach(function(s){ exp[s.number]=false; }); renderCards(); },
  random:function(){
    var s=D[Math.floor(Math.random()*D.length)], si=0;
    SEC.forEach(function(sec,i){ if(sec.ss.indexOf(s)!==-1)si=i; });
    curSec=si; exp[s.number]=true; lvl[s.number]=0;
    document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active',i===si); });
    renderCards();
    setTimeout(function(){ var c=document.getElementById('c'+s.number); if(c)c.scrollIntoView({behavior:'smooth',block:'center'}); },200);
  }
};

document.getElementById('btnExpand').onclick=App.expandAll;
document.getElementById('btnCollapse').onclick=App.collapseAll;
document.getElementById('btnRandom').onclick=App.random;

renderTabs();
selSec(0);

})();
</script>
